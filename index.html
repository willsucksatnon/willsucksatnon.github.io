<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export to TXT</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; padding: 10px; }
        button { 
            background-color: #007bff; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            cursor: pointer; 
            border-radius: 5px; 
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Text Exporter</h2>
    <p>Type something below and click export to save it as a .txt file.</p> <a href="https://github.com/willsucksatnon/willsucksatnon.github.io">Click here to go to the repo</a>
    
    <!-- The content to export -->
    <textarea id="text-val">Hello! This is the content that will be exported into your text file.</textarea>
    <br/>
    
    <!-- The trigger button -->
    <button id="export-btn">Download as .txt</button>   <button id="export-md-btn" style="background-color: #28a745;">Download as .md</button>
    
   <script src="script.js"></script>

</body>
</html>
